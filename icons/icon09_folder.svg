<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="folder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="#FFF8E1"/>
  <!-- フォルダー背面 -->
  <rect x="24" y="88" width="208" height="148" rx="14" fill="url(#folder)"/>
  <!-- タブ -->
  <rect x="24" y="72" width="80" height="32" rx="12" fill="url(#folder)"/>
  <rect x="24" y="84" width="80" height="20" rx="0" fill="url(#folder)"/>
  <!-- 写真3枚（扇状） -->
  <!-- 写真1（右傾き） -->
  <rect x="100" y="92" width="72" height="90" rx="8" fill="white" opacity="0.9" transform="rotate(12 136 137)"/>
  <rect x="104" y="96" width="64" height="82" rx="6" fill="#81D4FA" transform="rotate(12 136 137)"/>
  <polygon points="136,112 108,170 164,170" fill="#29B6F6" transform="rotate(12 136 137)"/>
  <!-- 写真2（中央） -->
  <rect x="84" y="96" width="72" height="90" rx="8" fill="white" opacity="0.9"/>
  <rect x="88" y="100" width="64" height="82" rx="6" fill="#A5D6A7"/>
  <polygon points="120,116 92,174 148,174" fill="#66BB6A"/>
  <circle cx="150" cy="112" r="10" fill="#FFF176"/>
  <!-- 写真3（左傾き） -->
  <rect x="68" y="92" width="72" height="90" rx="8" fill="white" opacity="0.9" transform="rotate(-12 104 137)"/>
  <rect x="72" y="96" width="64" height="82" rx="6" fill="#FFAB91" transform="rotate(-12 104 137)"/>
  <polygon points="104,112 76,170 132,170" fill="#FF7043" transform="rotate(-12 104 137)"/>
  <!-- フォルダー前面下部 -->
  <rect x="24" y="176" width="208" height="60" rx="14" fill="url(#folderFront)"/>
</svg>
